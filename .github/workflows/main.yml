name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Extract ZIP
      run: unzip LiveTranslate-Android-Project.zip
    - name: Build APK
      run: |
        cd LiveTranslate
        chmod +x gradlew
        ./gradlew assembleDebug
    - uses: actions/upload-artifact@
